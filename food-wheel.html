<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食光转盘 - 个人美食决策助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .wheel-container {
            perspective: 1000px;
        }
        
        .wheel {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .wheel.spinning {
            animation: spin 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(1800deg); }
        }
        
        .tab-active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .category-tag {
            transition: all 0.2s ease;
        }
        
        .category-tag:hover {
            transform: scale(1.05);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }
        
        .modal-overlay {
            backdrop-filter: blur(5px);
        }
        
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .friend-toggle-active {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        .upload-progress {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-orange-50 to-yellow-50 min-h-screen pb-20">
    <div class="max-w-md mx-auto px-4 py-6">
        <!-- 头部 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-orange-500 to-red-500 bg-clip-text text-transparent">
                🍽️ 食光转盘
            </h1>
            <p class="text-gray-600 mt-2">帮你快速做出美食决策</p>
        </header>

        <!-- 内容区域 -->
        <main id="app">
            <!-- 转盘页 -->
            <div id="page-wheel" class="page">
                <div class="text-center mb-8">
                    <h2 class="text-xl font-bold text-gray-800 mb-2">🎲 单人转盘</h2>
                    <p class="text-gray-500 text-sm">不知道吃什么？让转盘帮你决定！</p>
                </div>
                
                <div class="wheel-container flex justify-center mb-8">
                    <div id="wheel" class="wheel w-64 h-64 rounded-full bg-gradient-to-br from-orange-400 via-red-400 to-pink-500 flex items-center justify-center shadow-2xl border-8 border-white">
                        <div class="text-center text-white">
                            <div id="wheel-icon" class="text-6xl mb-2">🎡</div>
                            <div id="wheel-text" class="text-lg font-bold">点击开始</div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center">
                    <button id="btn-spin" class="btn-primary px-8 py-4 rounded-full text-white font-bold text-lg">
                        🎯 转一下
                    </button>
                </div>
            </div>

            <!-- 对战页 -->
            <div id="page-battle" class="page hidden">
                <div class="text-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-2">🎮 美食游戏中心</h2>
                    <p class="text-gray-500 text-sm">玩个小游戏决定今天吃什么！</p>
                </div>
                
                <!-- 好友选择 -->
                <div class="mb-6">
                    <h3 class="text-sm font-medium text-gray-700 mb-3">选择对战好友</h3>
                    <div class="flex justify-center gap-3">
                        <button class="battle-friend-btn flex flex-col items-center p-3 rounded-2xl border-2 border-orange-300 bg-orange-50 transition" data-friend="wang">
                            <span class="text-3xl mb-1">👨</span>
                            <span class="text-xs font-medium text-gray-700">王小明</span>
                        </button>
                        <button class="battle-friend-btn flex flex-col items-center p-3 rounded-2xl border-2 border-gray-200 bg-gray-50 transition" data-friend="li">
                            <span class="text-3xl mb-1">👩</span>
                            <span class="text-xs font-medium text-gray-700">李小萌</span>
                        </button>
                        <button class="battle-friend-btn flex flex-col items-center p-3 rounded-2xl border-2 border-gray-200 bg-gray-50 transition" data-friend="zhao">
                            <span class="text-3xl mb-1">🦸</span>
                            <span class="text-xs font-medium text-gray-700">赵大力</span>
                        </button>
                    </div>
                </div>
                
                <!-- 游戏选择 -->
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <button class="game-select-btn flex flex-col items-center p-3 rounded-2xl border-2 border-orange-300 bg-orange-50 transition" data-game="moji">
                        <span class="text-2xl mb-1">❤️</span>
                        <span class="text-xs font-medium text-gray-700">美食默契挑战</span>
                    </button>
                    <button class="game-select-btn flex flex-col items-center p-3 rounded-2xl border-2 border-gray-200 bg-gray-50 transition" data-game="dice">
                        <span class="text-2xl mb-1">🎲</span>
                        <span class="text-xs font-medium text-gray-700">骰子对决</span>
                    </button>
                    <button class="game-select-btn flex flex-col items-center p-3 rounded-2xl border-2 border-gray-200 bg-gray-50 transition" data-game="wheel">
                        <span class="text-2xl mb-1">🎡</span>
                        <span class="text-xs font-medium text-gray-700">转盘决战</span>
                    </button>
                </div>
                
                <!-- 游戏区域 -->
                <div id="game-area" class="bg-white rounded-3xl p-6 shadow-lg">
                    <!-- 游戏内容将在这里动态显示 -->
                </div>
            </div>
            
            <!-- 选择推荐店铺弹窗 -->
            <div id="modal-select-place" class="fixed inset-0 bg-black/50 modal-overlay hidden z-50 flex items-end sm:items-center justify-center">
                <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 max-h-[70vh] overflow-y-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-gray-800">选择推荐店铺</h3>
                        <button id="btn-close-select-place" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                    </div>
                    <div id="select-place-list" class="space-y-3">
                    </div>
                </div>
            </div>
            
            <!-- 游戏结果弹窗 -->
            <div id="modal-game-result" class="fixed inset-0 bg-black/50 modal-overlay hidden z-50 flex items-center justify-center">
                <div class="bg-white w-full max-w-md mx-4 rounded-3xl p-6 text-center fade-in">
                    <div id="result-emoji-game" class="text-6xl mb-4">🎉</div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">游戏结束！</h3>
                    <p id="result-winner" class="text-orange-600 font-bold mb-4"></p>
                    <div id="result-place-card" class="bg-orange-50 rounded-2xl p-4 mb-6">
                        <div class="text-3xl mb-2" id="result-place-emoji"></div>
                        <div id="result-place-name" class="text-lg font-bold text-gray-800 mb-1"></div>
                        <div id="result-place-dishes" class="text-sm text-gray-600"></div>
                    </div>
                    <p id="result-share-text" class="text-sm text-gray-500 mb-6"></p>
                    <div class="flex gap-3">
                        <button id="btn-back-to-games" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-medium hover:bg-gray-300 transition">
                            回到游戏选择
                        </button>
                        <button id="btn-play-again" class="flex-1 btn-primary py-3 rounded-xl text-white font-medium">
                            再来一局
                        </button>
                    </div>
                </div>
            </div>

            <!-- 店铺列表页 -->
            <div id="page-places" class="page hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">📋 我的店铺</h2>
                    <div class="flex gap-2">
                        <button id="btn-toggle-friend" class="px-3 py-2 rounded-xl text-sm font-medium bg-gray-100 text-gray-600 transition flex items-center gap-1">
                            👥 看好友的店铺
                        </button>
                        <button id="btn-add-place" class="btn-primary px-4 py-2 rounded-xl text-white font-medium">
                            + 添加
                        </button>
                    </div>
                </div>
                
                <!-- 分类筛选 -->
                <div class="flex flex-wrap gap-2 mb-4">
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-orange-100 text-orange-600 font-medium" data-category="all">
                        全部
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="火锅">
                        火锅
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="川菜">
                        川菜
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="日料">
                        日料
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="奶茶">
                        奶茶
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="烧烤">
                        烧烤
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="小吃">
                        小吃
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="快餐">
                        快餐
                    </button>
                    <button class="category-filter category-tag px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-600 font-medium" data-category="其他">
                        其他
                    </button>
                </div>
                
                <div id="places-list" class="space-y-4">
                </div>
            </div>

            <!-- 个人中心页 -->
            <div id="page-profile" class="page hidden">
                <div class="text-center mb-8">
                    <div class="text-6xl mb-4">👨‍🍳</div>
                    <h2 class="text-xl font-bold text-gray-800">美食达人</h2>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-white rounded-2xl p-6 shadow-lg text-center">
                        <div id="stat-places" class="text-3xl font-bold text-orange-500">0</div>
                        <div class="text-gray-500 text-sm">收藏店铺</div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg text-center">
                        <div id="stat-top-category" class="text-lg font-bold text-orange-500">-</div>
                        <div class="text-gray-500 text-sm">最爱分类</div>
                    </div>
                </div>
                
                <div class="space-y-3">
                    <button id="btn-export" class="w-full bg-white border-2 border-orange-300 rounded-xl p-4 text-left font-medium text-orange-600 hover:bg-orange-50 transition">
                        📤 导出数据
                    </button>
                    <button id="btn-import" class="w-full bg-white border-2 border-orange-300 rounded-xl p-4 text-left font-medium text-orange-600 hover:bg-orange-50 transition">
                        📥 导入数据
                    </button>
                    <input type="file" id="import-file" accept=".json" class="hidden">
                </div>
            </div>
        </main>

        <!-- 底部导航 -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-2">
            <div class="max-w-md mx-auto flex justify-around">
                <button class="tab tab-active flex flex-col items-center py-2 px-4 rounded-2xl" data-page="wheel">
                    <span class="text-2xl">🎡</span>
                    <span class="text-xs mt-1">转盘</span>
                </button>
                <button class="tab flex flex-col items-center py-2 px-4 rounded-2xl text-gray-500" data-page="battle">
                    <span class="text-2xl">⚔️</span>
                    <span class="text-xs mt-1">对战</span>
                </button>
                <button class="tab flex flex-col items-center py-2 px-4 rounded-2xl text-gray-500" data-page="places">
                    <span class="text-2xl">📋</span>
                    <span class="text-xs mt-1">店铺</span>
                </button>
                <button class="tab flex flex-col items-center py-2 px-4 rounded-2xl text-gray-500" data-page="profile">
                    <span class="text-2xl">👤</span>
                    <span class="text-xs mt-1">我的</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- 添加店铺弹窗 -->
    <div id="modal-add-place" class="fixed inset-0 bg-black/50 modal-overlay hidden z-50 flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 transform transition-transform">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">添加店铺</h3>
                <button id="btn-close-modal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            
            <form id="form-add-place" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">店铺名称 *</label>
                    <input type="text" id="place-name" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="输入店铺名称">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">推荐菜品 *</label>
                    <input type="text" id="place-dishes" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="多个用逗号分隔">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">美食分类 *</label>
                    <select id="place-category" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                        <option value="">请选择分类</option>
                        <option value="火锅">火锅</option>
                        <option value="川菜">川菜</option>
                        <option value="日料">日料</option>
                        <option value="奶茶">奶茶</option>
                        <option value="烧烤">烧烤</option>
                        <option value="小吃">小吃</option>
                        <option value="快餐">快餐</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">人均价格</label>
                    <input type="number" id="place-price" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="输入人均价格">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">店铺图片</label>
                    <div class="flex gap-2 items-start">
                        <div class="flex-1">
                            <input type="file" id="place-image-file" accept="image/*" class="hidden">
                            <button type="button" id="btn-upload-image" class="w-full px-4 py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 hover:border-orange-400 hover:text-orange-500 transition flex items-center justify-center gap-2">
                                📷 上传图片
                            </button>
                            <div id="upload-progress" class="upload-progress mt-2 hidden">
                                <div id="upload-progress-bar" class="upload-progress-bar" style="width: 0%"></div>
                            </div>
                            <div id="upload-status" class="text-sm mt-2 hidden"></div>
                        </div>
                        <img id="image-preview" src="" class="w-16 h-16 rounded-xl object-cover hidden border border-gray-200">
                    </div>
                    <div class="mt-2">
                        <input type="text" id="place-image-url" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent text-sm" placeholder="或直接输入图片URL">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">一句话记忆点</label>
                    <input type="text" id="place-memory" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent" placeholder="如：毛肚绝了">
                </div>
                
                <button type="submit" class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg mt-6">
                    保存
                </button>
            </form>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div id="modal-result" class="fixed inset-0 bg-black/50 modal-overlay hidden z-50 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm mx-4 rounded-3xl p-6 text-center fade-in">
            <div id="result-emoji" class="text-6xl mb-4">🎉</div>
            <h3 id="result-name" class="text-2xl font-bold text-gray-800 mb-2">店铺名称</h3>
            <div id="result-category" class="inline-block bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm font-medium mb-3">分类</div>
            <div id="result-dishes" class="text-gray-600 mb-2">推荐菜品</div>
            <div id="result-price" class="text-gray-500 mb-2"></div>
            <div id="result-memory" class="text-orange-600 italic mb-6"></div>
            <div class="flex gap-3">
                <button id="btn-close-result" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-medium hover:bg-gray-300 transition">
                    关闭
                </button>
                <button id="btn-spin-again" class="flex-1 btn-primary py-3 rounded-xl text-white font-medium">
                    再转一次
                </button>
            </div>
        </div>
    </div>

        document.getElementById('place-image-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const progressDiv = document.getElementById('upload-progress');
            const progressBar = document.getElementById('upload-progress-bar');
            const statusDiv = document.getElementById('upload-status');
            const previewImg = document.getElementById('image-preview');
            
            if (!file.type.startsWith('image/')) {
                statusDiv.textContent = '请选择图片文件';
                statusDiv.classList.remove('hidden', 'text-green-600');
                statusDiv.classList.add('text-red-600');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                statusDiv.textContent = '图片大小不能超过5MB';
                statusDiv.classList.remove('hidden', 'text-green-600');
                statusDiv.classList.add('text-red-600');
                return;
            }
            
            progressDiv.classList.remove('hidden');
            statusDiv.classList.remove('hidden');
            statusDiv.textContent = '上传中...';
            statusDiv.classList.remove('text-red-600');
            statusDiv.classList.add('text-gray-600');
            progressBar.style.width = '30%';
            
            try {
                const formData = new FormData();
                formData.append('smfile', file);
                
                const response = await fetch('https://sm.ms/api/v2/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    pendingImageUrl = data.data.url;
                    previewImg.src = pendingImageUrl;
                    previewImg.classList.remove('hidden');
                    
                    progressBar.style.width = '100%';
                    statusDiv.textContent = '上传成功！';
                    statusDiv.classList.remove('text-gray-600');
                    statusDiv.classList.add('text-green-600');
                    
                    setTimeout(() => {
                        progressDiv.classList.add('hidden');
                    }, 1500);
                } else {
                    throw new Error(data.images || '上传失败');
                }
            } catch (error) {
                progressBar.style.width = '0%';
                progressDiv.classList.add('hidden');
                statusDiv.textContent = '上传失败，请手动输入图片URL';
                statusDiv.classList.remove('text-gray-600');
                statusDiv.classList.add('text-red-600');
                console.error('Upload error:', error);
            }
            
            e.target.value = '';
        });

                    </button>
                `;
            }
            
            area.innerHTML = html;
            
            if (!gameOver) {
                document.getElementById('btn-roll-my-dice').addEventListener('click', rollMyDice);
                document.getElementById('btn-roll-friend-dice').addEventListener('click', rollFriendDice);
            } else {
                document.getElementById('btn-dice-end').addEventListener('click', endDiceGame);
            }
        }
        
        function getDiceEmoji(num) {
            const dice = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            return dice[num - 1];
        }
        
        function rollMyDice() {
            const round = gameState.dice.currentRound;
            if (gameState.dice.rounds[round].myDice !== null) return;
            
            const result = Math.floor(Math.random() * 6) + 1;
            gameState.dice.rounds[round].myDice = result;
            document.getElementById('my-dice-display').textContent = getDiceEmoji(result);
            renderDiceGame();
        }
        
        function rollFriendDice() {
            const round = gameState.dice.currentRound;
            if (!gameState.dice.rounds[round].myDice || gameState.dice.rounds[round].friendDice !== null) return;
            
            const result = Math.floor(Math.random() * 6) + 1;
            gameState.dice.rounds[round].friendDice = result;
            document.getElementById('friend-dice-display').textContent = getDiceEmoji(result);
            
            const r = gameState.dice.rounds[round];
            if (r.myDice > r.friendDice) {
                r.winner = 'me';
            } else if (r.myDice < r.friendDice) {
                r.winner = 'friend';
            } else {
                r.winner = 'draw';
            }
            
            gameState.dice.currentRound++;
            setTimeout(renderDiceGame, 500);
        }
        
        function getMyDiceWins() {
            return gameState.dice.rounds.filter(r => r.winner === 'me').length;
        }
        
        function getFriendDiceWins() {
            return gameState.dice.rounds.filter(r => r.winner === 'friend').length;
        }
        
        function checkDiceGameOver() {
            const myWins = getMyDiceWins();
            const friendWins = getFriendDiceWins();
            const roundsPlayed = gameState.dice.rounds.filter(r => r.winner !== null).length;
            
            if (myWins >= 2 || friendWins >= 2 || roundsPlayed >= 3) {
                return true;
            }
            return false;
        }
        
        function getDiceWinner() {
            const myWins = getMyDiceWins();
            const friendWins = getFriendDiceWins();
            return myWins >= friendWins ? 'me' : 'friend';
        }
        
        function endDiceGame() {
            const winner = getDiceWinner();
            let winnerText = '';
            let places = [];
            
            if (winner === 'me') {

                places = appData.places.length > 0 ? appData.places : battleFriends[gameState.selectedFriendId].places;

                places = battleFriends[gameState.selectedFriendId].places;

            const finalPlace = places[Math.floor(Math.random() * places.length)];
            const shareText = `我们通过骰子对决决定去吃${finalPlace.name}！`;
            showGameResult(winnerText, finalPlace, shareText);
        }

        function submitMojiAnswer(idx) {
            gameState.moji.myAnswers[gameState.moji.currentQ] = idx;
            gameState.moji.friendAnswers[gameState.moji.currentQ] = Math.floor(Math.random() * 3);
            
            if (gameState.moji.myAnswers[gameState.moji.currentQ] === gameState.moji.friendAnswers[gameState.moji.currentQ]) {
                gameState.moji.score[0]++;
                gameState.moji.score[1]++;
            }
            
            renderMojiGame();
        }

                        <button id="btn-moji-final-spin" class="btn-primary w-full py-3 rounded-xl text-white font-medium">
                            🎡 开始转盘
                        </button>
                    `;
                } else if (gameState.wheel.selected) {
                    const finalPlace = gameState.wheel.selected === 'me' ? gameState.wheel.myPlace : gameState.wheel.friendPlace;
                    const winnerText = gameState.wheel.selected === 'me' ? '听你的！' : '听' + friend.name + '的！';
                    html += `
                        <div class="text-center mb-4">
                            <div class="text-4xl mb-2">🎉</div>
                            <div class="font-bold text-gray-800">${winnerText}</div>
                        </div>
                        <button id="btn-moji-final-end" class="btn-primary w-full py-3 rounded-xl text-white font-medium">
                            查看结果
                        </button>
                    `;
                }
                
                setTimeout(() => {
                    if (!gameState.wheel.myPlace) {
                        document.getElementById('btn-moji-final-select-my')?.addEventListener('click', () => {
                            showPlaceSelectModal((place) => {
                                gameState.wheel.myPlace = place;
                                renderMojiGame();
                            });
                        });
                    }
                    
                    if (!gameState.wheel.friendPlace) {
                        document.getElementById('btn-moji-final-select-friend')?.addEventListener('click', () => {
                            const friendPlaces = battleFriends[gameState.selectedFriendId].places;
                            const place = friendPlaces[Math.floor(Math.random() * friendPlaces.length)];
                            gameState.wheel.friendPlace = place;
                            renderMojiGame();
                        });
                    }
                    
                    if (gameState.wheel.myPlace && gameState.wheel.friendPlace && !gameState.wheel.selected) {
                        document.getElementById('btn-moji-final-spin')?.addEventListener('click', () => {
                            gameState.wheel.selected = Math.random() > 0.5 ? 'me' : 'friend';
                            renderMojiGame();
                        });
                    }
                    
                    if (gameState.wheel.myPlace && gameState.wheel.friendPlace && gameState.wheel.selected) {
                        document.getElementById('btn-moji-final-end')?.addEventListener('click', () => {
                            const finalPlace = gameState.wheel.selected === 'me' ? gameState.wheel.myPlace : gameState.wheel.friendPlace;
                            const winnerText = gameState.wheel.selected === 'me' ? '听你的！' : '听' + friend.name + '的！';
                            const shareText = `我们通过美食默契挑战决定去吃${finalPlace.name}！`;
                            showGameResult(winnerText, finalPlace, shareText);
                        });
                    }
                }, 100);
            }
            
            return html;
        }
        
        // 初始化页面时显示第一个游戏
        setTimeout(() => {
            if (document.getElementById('page-battle')) {
                resetGameArea();
            }
        }, 100);
        
        function updateStats() {
            document.getElementById('stat-places').textContent = appData.places.length;
            
            if (appData.places.length > 0) {
                const categoryCount = {};
                appData.places.forEach(p => {
                    categoryCount[p.category] = (categoryCount[p.category] || 0) + 1;
                });
                
                const topCategory = Object.entries(categoryCount).sort((a, b) => b[1] - a[1])[0];
                document.getElementById('stat-top-category').textContent = categoryEmojis[topCategory[0]] + ' ' + topCategory[0];
            }
        }
        
        document.getElementById('btn-export').addEventListener('click', () => {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'food-wheel-data.json';
            a.click();
            URL.revokeObjectURL(url);
        });
        
        document.getElementById('btn-import').addEventListener('click', () => {
            document.getElementById('import-file').click();
        });
        
        document.getElementById('import-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.places) {
                            appData = importedData;
                            saveData(appData);
                            alert('数据导入成功！');
                            renderPlacesList();
                            updateStats();
                        } else {
                            alert('无效的数据格式');
                        }
                    } catch (err) {
                        alert('导入失败：' + err.message);
                    }
                };
                reader.readAsText(file);
            }
            e.target.value = '';
        });
        
        renderPlacesList();
        updateStats();
    </script>
</body>
</html>
